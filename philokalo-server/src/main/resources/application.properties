spring.profiles.active=local
server.port=8080
server.servlet.context-path=/philokalo
spring.application.name=philokalo-server

spring.datasource.url=jdbc:mysql://localhost:3306/philokalodb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.time-zone=Asia/Ho_Chi_Minh
logging.level.org.springframework.security=DEBUG

app.jwt.signer-key=${JWT_SIGNER_KEY}
app.jwt.algorithm=HS512
app.jwt.valid-duration=10
app.jwt.refreshable-duration=120

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.folder.avatar=philokalo-cloud/avatar
app.cloudinary.folder.gallery=philokalo-cloud/gallery
app.cloudinary.size=10485760